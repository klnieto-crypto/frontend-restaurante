<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurante XYZ — Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0b09;
      --panel: #151412;
      --border: #2a2825;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: rgba(201,168,76,0.10);
      --text: #f0ead8;
      --muted: #7a7470;
      --dim: #3a3835;
      --red: #c0392b;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* fondo decorativo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 70% 50%, rgba(201,168,76,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 10% 80%, rgba(201,168,76,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 900px;
      min-height: 520px;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* LADO IZQUIERDO */
    .brand-side {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      position: relative;
      overflow: hidden;
    }

    .brand-side::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.08);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .brand-side::after {
      content: '';
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.12);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .brand-icon {
      font-size: 3.5rem;
      margin-bottom: 1.25rem;
      position: relative;
      z-index: 1;
    }

    .brand-name {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.02em;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .brand-tagline {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.5rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .brand-divider {
      width: 40px;
      height: 1px;
      background: var(--gold);
      opacity: 0.4;
      margin: 1.5rem auto;
      position: relative;
      z-index: 1;
    }

    .brand-desc {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      max-width: 200px;
      position: relative;
      z-index: 1;
    }

    /* LADO DERECHO */
    .form-side {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem 3rem;
    }

    .form-title {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .form-subtitle {
      font-size: 0.83rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.73rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .form-input {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.92rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
    }

    .form-input::placeholder { color: var(--dim); }

    .btn-login {
      width: 100%;
      background: var(--gold);
      color: #0c0b09;
      border: none;
      padding: 0.85rem;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.92rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s, transform 0.15s;
      letter-spacing: 0.02em;
    }

    .btn-login:hover { background: var(--gold-light); }
    .btn-login:active { transform: scale(0.98); }

    .error-msg {
      background: rgba(192,57,43,0.1);
      border: 1px solid rgba(192,57,43,0.3);
      color: #e74c3c;
      padding: 0.65rem 1rem;
      border-radius: 7px;
      font-size: 0.83rem;
      margin-bottom: 1rem;
      display: none;
    }

    .loading {
      display: none;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.75rem;
    }
  </style>
</head>
<body>

  <div class="wrapper">

    <!-- MARCA -->
    <div class="brand-side">
      <div class="brand-icon">🍽</div>
      <div class="brand-name">Restaurante XYZ</div>
      <div class="brand-tagline">Sistema de gestión</div>
      <div class="brand-divider"></div>
      <p class="brand-desc">Administra reservas, pedidos y productos desde un solo lugar.</p>
    </div>

    <!-- FORMULARIO -->
    <div class="form-side">
      <h2 class="form-title">Bienvenido</h2>
      <p class="form-subtitle">Ingresa tus credenciales para continuar</p>

      <div class="error-msg" id="error-msg">Usuario o contraseña incorrectos.</div>

      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico</label>
        <input
          type="email"
          id="email"
          class="form-input"
          placeholder="correo@restaurante.com"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          class="form-input"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      <button class="btn-login" onclick="iniciarSesion()">Iniciar sesión</button>
      <p class="loading" id="loading">Verificando...</p>
    </div>

  </div>

  <script>
    // karen: [Lógica de login]
    const API_AUTH = 'http://localhost:8001';

    async function iniciarSesion() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl  = document.getElementById('error-msg');
      const loadEl   = document.getElementById('loading');

      errorEl.style.display = 'none';

      if (!email || !password) {
        errorEl.textContent = 'Por favor completa todos los campos.';
        errorEl.style.display = 'block';
        return;
      }

      loadEl.style.display = 'block';

      try {
        const res = await fetch(`${API_AUTH}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('usuario', JSON.stringify(data.usuario));
          window.location.href = 'dashboard.html';
        } else {
          errorEl.textContent = data.mensaje || 'Credenciales incorrectas.';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'No se pudo conectar con el servidor.';
        errorEl.style.display = 'block';
      } finally {
        loadEl.style.display = 'none';
      }
    }

    // Enter para enviar
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') iniciarSesion();
    });

    // Si ya hay sesión activa, redirigir
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }
  </script>

</body>
</html>
