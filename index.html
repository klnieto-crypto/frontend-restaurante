<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurante XYZ — Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="wrapper">

    <div class="brand-side">
      <div class="brand-icon">🍽</div>
      <div class="brand-name">Restaurante XYZ</div>
      <div class="brand-tagline">Sistema de gestión</div>
      <div class="brand-divider"></div>
      <p class="brand-desc">Administra reservas, pedidos y productos desde un solo lugar.</p>
    </div>

    <div class="form-side">
      <h2 class="form-title">Bienvenido</h2>
      <p class="form-subtitle">Ingresa tus credenciales para continuar</p>

      <div class="error-msg" id="error-msg">Usuario o contraseña incorrectos.</div>

      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico</label>
        <input type="email" id="email" class="form-input" placeholder="correo@restaurante.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn-login" onclick="iniciarSesion()">Iniciar sesión</button>
      <p class="loading" id="loading">Verificando...</p>
    </div>

  </div>

  <script src="js/app.js"></script>
  <script>
    const API_AUTH = 'http://localhost:8001';

    async function iniciarSesion() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl  = document.getElementById('error-msg');
      const loadEl   = document.getElementById('loading');

      errorEl.style.display = 'none';

      if (!email || !password) {
        errorEl.textContent = 'Por favor completa todos los campos.';
        errorEl.style.display = 'block';
        return;
      }

      loadEl.style.display = 'block';

      try {
        const res = await fetch(`${API_AUTH}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('usuario', JSON.stringify(data.usuario));
          window.location.href = 'dashboard.html';
        } else {
          errorEl.textContent = data.mensaje || 'Credenciales incorrectas.';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'No se pudo conectar con el servidor.';
        errorEl.style.display = 'block';
      } finally {
        loadEl.style.display = 'none';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') iniciarSesion();
    });

    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }
  </script>

</body>
</html>
