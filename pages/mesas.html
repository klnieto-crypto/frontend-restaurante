<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurante XYZ — Mesas</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0b09;
      --panel: #151412;
      --border: #2a2825;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: rgba(201,168,76,0.10);
      --text: #f0ead8;
      --muted: #7a7470;
      --dim: #3a3835;
      --green: #27ae60;
      --red: #c0392b;
      --blue: #2980b9;
      --orange: #e67e22;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-display);
      font-size: 1.25rem;
      color: var(--gold);
      text-decoration: none;
    }

    .nav { display: flex; gap: 0.25rem; }

    .nav-link {
      color: var(--muted);
      text-decoration: none;
      padding: 0.35rem 0.9rem;
      border-radius: 6px;
      font-size: 0.88rem;
      transition: all 0.2s;
    }
    .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .nav-link.active { color: var(--gold); background: var(--gold-dim); }

    .user-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: var(--font-body);
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* MAIN */
    .main {
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 600;
      color: var(--text);
    }

    .btn-primary {
      background: var(--gold);
      color: #0c0b09;
      border: none;
      padding: 0.6rem 1.3rem;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--gold-light); }

    .btn-secondary {
      background: none;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.6rem 1.3rem;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: var(--muted); color: var(--text); }

    /* FILTROS */
    .filtros {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .filtro {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.35rem 1rem;
      border-radius: 20px;
      font-size: 0.82rem;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filtro:hover { border-color: var(--gold); color: var(--text); }
    .filtro.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }

    /* GRID MESAS */
    .mesas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }

    .mesa-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: all 0.2s;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .mesa-card:hover { border-color: var(--gold); transform: translateY(-2px); }

    .mesa-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .mesa-numero {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .mesa-numero span {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: var(--font-body);
      font-weight: 400;
      display: block;
      margin-top: 2px;
    }

    .estado-badge {
      font-size: 0.72rem;
      padding: 0.22rem 0.7rem;
      border-radius: 20px;
      font-weight: 500;
    }

    .estado-disponible  { background: rgba(39,174,96,0.12);  color: var(--green);  border: 1px solid rgba(39,174,96,0.25); }
    .estado-ocupada     { background: rgba(192,57,43,0.12);   color: var(--red);    border: 1px solid rgba(192,57,43,0.25); }
    .estado-reservada   { background: rgba(201,168,76,0.12);  color: var(--gold);   border: 1px solid rgba(201,168,76,0.25); }

    .mesa-icon {
      font-size: 2rem;
      text-align: center;
    }

    .mesa-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .mesa-acciones {
      display: flex;
      gap: 0.5rem;
    }

    .btn-accion {
      flex: 1;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.45rem;
      border-radius: 6px;
      font-family: var(--font-body);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .btn-accion:hover { border-color: var(--gold); color: var(--gold); }
    .btn-accion.danger:hover { border-color: var(--red); color: var(--red); }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: slideUp 0.22s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h3 {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--gold);
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      transition: color 0.2s;
    }
    .modal-close:hover { color: var(--text); }

    .modal-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }

    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }

    .label {
      font-size: 0.73rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .input {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.65rem 0.9rem;
      border-radius: 7px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .input:focus { border-color: var(--gold); }
    select.input option { background: var(--panel); }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 0.88rem;
      z-index: 300;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transition: opacity 0.3s;
    }
    .toast.ok    { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: var(--red); color: var(--red); }
    .hidden { display: none !important; }

    .cargando {
      text-align: center;
      color: var(--muted);
      padding: 3rem;
      font-size: 0.9rem;
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <a href="../dashboard.html" class="logo">🍽 Restaurante XYZ</a>
      <nav class="nav">
        <a href="mesas.html" class="nav-link active">Mesas</a>
        <a href="reservas.html" class="nav-link">Reservas</a>
        <a href="productos.html" class="nav-link">Productos</a>
        <a href="pedidos.html" class="nav-link">Pedidos</a>
      </nav>
      <div class="user-bar">
        <span id="usuario-nombre"></span>
        <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
      </div>
    </div>
  </header>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <!-- MAIN -->
  <main class="main">
    <div class="page-header">
      <h1 class="page-title">Mesas</h1>
      <button class="btn-primary" onclick="abrirModal()">+ Nueva mesa</button>
    </div>

    <div class="filtros">
      <button class="filtro active" data-estado="">Todas</button>
      <button class="filtro" data-estado="disponible">Disponibles</button>
      <button class="filtro" data-estado="ocupada">Ocupadas</button>
      <button class="filtro" data-estado="reservada">Reservadas</button>
    </div>

    <div class="mesas-grid" id="mesas-grid">
      <p class="cargando">Cargando mesas...</p>
    </div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay hidden" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-titulo">Nueva Mesa</h3>
        <button class="modal-close" onclick="cerrarModal()">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="mesa-id" />
        <div class="form-group">
          <label class="label">Número de mesa</label>
          <input type="number" id="mesa-numero" class="input" min="1" placeholder="Ej: 5" />
        </div>
        <div class="form-group">
          <label class="label">Capacidad (personas)</label>
          <input type="number" id="mesa-capacidad" class="input" min="1" placeholder="Ej: 4" />
        </div>
        <div class="form-group">
          <label class="label">Estado</label>
          <select id="mesa-estado" class="input">
            <option value="disponible">Disponible</option>
            <option value="ocupada">Ocupada</option>
            <option value="reservada">Reservada</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-primary" onclick="guardarMesa()">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    // karen: [Lógica módulo mesas]
    const API = 'http://localhost:8002';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '../index.html';

    const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
    document.getElementById('usuario-nombre').textContent = usuario.nombre || 'karen';

    let mesas = [];
    let filtroActivo = '';

    // Cargar mesas
    async function cargarMesas() {
      try {
        const res = await fetch(`${API}/mesas`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        mesas = data.data || [];
        renderMesas();
      } catch (e) {
        document.getElementById('mesas-grid').innerHTML =
          '<p class="cargando">No se pudo conectar con el servidor.</p>';
      }
    }

    function renderMesas() {
      const grid = document.getElementById('mesas-grid');
      const filtradas = filtroActivo
        ? mesas.filter(m => m.estado === filtroActivo)
        : mesas;

      if (!filtradas.length) {
        grid.innerHTML = '<p class="cargando">No hay mesas registradas.</p>';
        return;
      }

      const iconos = { disponible: '🪑', ocupada: '🍽', reservada: '📅' };

      grid.innerHTML = filtradas.map(mesa => `
        <div class="mesa-card">
          <div class="mesa-card-top">
            <div class="mesa-numero">
              Mesa ${mesa.numero}
              <span>${mesa.capacidad} personas</span>
            </div>
            <span class="estado-badge estado-${mesa.estado}">${mesa.estado}</span>
          </div>
          <div class="mesa-icon">${iconos[mesa.estado] || '🪑'}</div>
          <div class="mesa-info">
            <span>ID: ${mesa.id}</span>
            <span>Cap: ${mesa.capacidad}</span>
          </div>
          <div class="mesa-acciones">
            <button class="btn-accion" onclick="editarMesa(${mesa.id})">Editar</button>
            <button class="btn-accion danger" onclick="eliminarMesa(${mesa.id})">Eliminar</button>
          </div>
        </div>
      `).join('');
    }

    // Filtros
    document.querySelectorAll('.filtro').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filtro').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filtroActivo = btn.dataset.estado;
        renderMesas();
      });
    });

    // Modal
    function abrirModal(mesa = null) {
      document.getElementById('modal-titulo').textContent = mesa ? 'Editar Mesa' : 'Nueva Mesa';
      document.getElementById('mesa-id').value = mesa ? mesa.id : '';
      document.getElementById('mesa-numero').value = mesa ? mesa.numero : '';
      document.getElementById('mesa-capacidad').value = mesa ? mesa.capacidad : '';
      document.getElementById('mesa-estado').value = mesa ? mesa.estado : 'disponible';
      document.getElementById('modal').classList.remove('hidden');
    }

    function cerrarModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function editarMesa(id) {
      const mesa = mesas.find(m => m.id === id);
      if (mesa) abrirModal(mesa);
    }

    // Guardar (crear o editar)
    async function guardarMesa() {
      const id         = document.getElementById('mesa-id').value;
      const numero     = document.getElementById('mesa-numero').value;
      const capacidad  = document.getElementById('mesa-capacidad').value;
      const estado     = document.getElementById('mesa-estado').value;

      if (!numero || !capacidad) {
        mostrarToast('Completa todos los campos', 'error');
        return;
      }

      const body = { numero: parseInt(numero), capacidad: parseInt(capacidad), estado };
      const url    = id ? `${API}/mesas/${id}` : `${API}/mesas`;
      const method = id ? 'PUT' : 'POST';

      try {
        const res = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(body)
        });

        if (res.ok) {
          mostrarToast(id ? 'Mesa actualizada' : 'Mesa creada', 'ok');
          cerrarModal();
          cargarMesas();
        } else {
          mostrarToast('Error al guardar', 'error');
        }
      } catch (e) {
        mostrarToast('Error de conexión', 'error');
      }
    }

    // Eliminar
    async function eliminarMesa(id) {
      if (!confirm('¿Eliminar esta mesa?')) return;
      try {
        const res = await fetch(`${API}/mesas/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          mostrarToast('Mesa eliminada', 'ok');
          cargarMesas();
        } else {
          mostrarToast('No se pudo eliminar', 'error');
        }
      } catch (e) {
        mostrarToast('Error de conexión', 'error');
      }
    }

    // Toast
    function mostrarToast(msg, tipo = 'ok') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${tipo}`;
      setTimeout(() => t.classList.add('hidden'), 3000);
    }

    function cerrarSesion() {
      localStorage.removeItem('token');
      localStorage.removeItem('usuario');
      window.location.href = '../index.html';
    }

    cargarMesas();
  </script>

</body>
</html>
