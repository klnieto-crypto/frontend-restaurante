<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurante XYZ — Pedidos</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="../dashboard.html" class="logo">🍽 Restaurante XYZ</a>
      <nav class="nav">
        <a href="mesas.html" class="nav-link">Mesas</a>
        <a href="reservas.html" class="nav-link">Reservas</a>
        <a href="productos.html" class="nav-link">Productos</a>
        <a href="pedidos.html" class="nav-link active">Pedidos</a>
      </nav>
      <div class="user-bar">
        <span id="usuario-nombre"></span>
        <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
      </div>
    </div>
  </header>

  <div id="toast" class="toast hidden"></div>

  <main class="main-pedidos">

    <section class="panel">
      <div class="panel-header">
        <h2 class="panel-title">Pedidos</h2>
        <button class="btn-primary" onclick="abrirModalNuevo()">+ Nuevo</button>
      </div>
      <div class="filtros">
        <button class="filtro active" data-estado="">Todos</button>
        <button class="filtro" data-estado="pendiente">Pendiente</button>
        <button class="filtro" data-estado="en_preparacion">En prep.</button>
        <button class="filtro" data-estado="entregado">Entregado</button>
        <button class="filtro" data-estado="pagado">Pagado</button>
        <button class="filtro" data-estado="cancelado">Cancelado</button>
      </div>
      <div class="lista-pedidos" id="lista-pedidos">
        <p class="cargando">Cargando pedidos...</p>
      </div>
    </section>

    <section class="panel" id="panel-detalle">
      <div class="detalle-vacio" id="detalle-vacio">
        <span class="detalle-vacio-icon">🧾</span>
        <p>Selecciona un pedido para ver el detalle</p>
      </div>
      <div class="detalle-content hidden" id="detalle-content">
        <div class="detalle-header">
          <div>
            <h3 class="detalle-titulo" id="detalle-titulo">Pedido #1</h3>
            <p class="detalle-meta" id="detalle-meta"></p>
          </div>
          <span class="estado-badge" id="detalle-estado-badge"></span>
        </div>
        <div class="detalle-mesa" id="detalle-mesa"></div>
        <div>
          <p class="section-title">Productos</p>
          <table class="tabla-items">
            <thead>
              <tr><th>Producto</th><th>Cant.</th><th>Precio unit.</th><th>Subtotal</th><th></th></tr>
            </thead>
            <tbody id="tabla-detalles-body"></tbody>
          </table>
        </div>
        <div class="totales">
          <div class="total-row"><span>Subtotal</span><span id="detalle-subtotal">$0</span></div>
          <div class="total-row total-final"><span>Total</span><span id="detalle-total">$0</span></div>
        </div>
        <div>
          <p class="section-title">Cambiar estado</p>
          <div class="estado-buttons" id="estado-buttons"></div>
        </div>
        <div>
          <p class="section-title">Agregar producto</p>
          <div class="agregar-form">
            <select id="select-producto" class="input"></select>
            <input type="number" id="input-cantidad" class="input input-cant" min="1" value="1" />
            <button class="btn-primary" onclick="agregarProducto()">Agregar</button>
          </div>
        </div>
      </div>
    </section>

  </main>

  <div class="modal-overlay hidden" id="modal-nuevo">
    <div class="modal">
      <div class="modal-header">
        <h3>Nuevo Pedido</h3>
        <button class="modal-close" onclick="cerrarModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="label">Mesa</label>
          <select id="select-mesa" class="input"></select>
        </div>
        <div class="form-group">
          <label class="label">Fecha</label>
          <input type="date" id="input-fecha" class="input" />
        </div>
        <div class="form-group">
          <label class="label">Hora</label>
          <input type="time" id="input-hora" class="input" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-primary" onclick="crearPedido()">Crear Pedido</button>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    // karen: [Lógica módulo pedidos]
    const API_PEDIDOS   = 'http://localhost:8004';
    const API_RESERVAS  = 'http://localhost:8002';
    const API_PRODUCTOS = 'http://localhost:8003';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '../index.html';

    const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
    document.getElementById('usuario-nombre').textContent = usuario.nombre || 'karen';

    let pedidos = [], productos = [], mesas = [], pedidoSeleccionado = null, filtroActivo = '';
    const fmt = v => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(v);

    async function cargarDatos() {
      try {
        const [pRes, prRes, mRes] = await Promise.all([
          fetch(`${API_PEDIDOS}/pedidos`,    { headers: { 'Authorization': `Bearer ${token}` } }),
          fetch(`${API_PRODUCTOS}/productos`, { headers: { 'Authorization': `Bearer ${token}` } }),
          fetch(`${API_RESERVAS}/mesas`,     { headers: { 'Authorization': `Bearer ${token}` } })
        ]);
        pedidos   = (await pRes.json()).data  || [];
        productos = (await prRes.json()).data || [];
        mesas     = (await mRes.json()).data  || [];
        renderLista();
        cargarSelectProductos();
        cargarSelectMesas();
      } catch (e) {
        document.getElementById('lista-pedidos').innerHTML = '<p class="cargando">No se pudo conectar.</p>';
      }
    }

    function renderLista() {
      const lista = document.getElementById('lista-pedidos');
      const filtrados = filtroActivo ? pedidos.filter(p => p.estado === filtroActivo) : pedidos;
      if (!filtrados.length) { lista.innerHTML = '<p class="cargando">No hay pedidos.</p>'; return; }
      lista.innerHTML = filtrados.map(p => `
        <div class="pedido-card ${pedidoSeleccionado?.id === p.id ? 'selected' : ''}" onclick="seleccionarPedido(${p.id})">
          <div>
            <div class="pedido-num">Pedido #${p.id}</div>
            <div class="pedido-meta">Mesa ${p.mesa_id} · ${p.fecha} ${p.hora}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.4rem">
            <span class="estado-badge estado-${p.estado}">${p.estado.replace('_',' ')}</span>
            <span class="pedido-total">${fmt(p.total)}</span>
          </div>
        </div>`).join('');
    }

    async function seleccionarPedido(id) {
      pedidoSeleccionado = pedidos.find(p => p.id === id);
      renderLista();
      try {
        const res  = await fetch(`${API_PEDIDOS}/pedidos/${id}/detalles`, { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        renderDetalle(pedidoSeleccionado, data.data || []);
      } catch (e) { renderDetalle(pedidoSeleccionado, []); }
    }

    function renderDetalle(pedido, detalles) {
      document.getElementById('detalle-vacio').classList.add('hidden');
      document.getElementById('detalle-content').classList.remove('hidden');
      document.getElementById('detalle-titulo').textContent = `Pedido #${pedido.id}`;
      document.getElementById('detalle-meta').textContent   = `${pedido.fecha} · ${pedido.hora}`;
      document.getElementById('detalle-mesa').textContent   = `Mesa ${pedido.mesa_id}`;
      const badge = document.getElementById('detalle-estado-badge');
      badge.textContent = pedido.estado.replace('_', ' ');
      badge.className   = `estado-badge estado-${pedido.estado}`;
      const tbody = document.getElementById('tabla-detalles-body');
      tbody.innerHTML = !detalles.length
        ? '<tr><td colspan="5" style="color:var(--muted);padding:1rem;text-align:center">Sin productos</td></tr>'
        : detalles.map(d => {
            const prod = productos.find(p => p.id === d.producto_id);
            return `<tr>
              <td>${prod ? prod.nombre : `#${d.producto_id}`}</td>
              <td>${d.cantidad}</td>
              <td>${fmt(d.precio_unitario)}</td>
              <td>${fmt(d.subtotal)}</td>
              <td><button class="btn-eliminar" onclick="eliminarDetalle(${d.id})">✕</button></td>
            </tr>`;
          }).join('');
      const total = detalles.reduce((s, d) => s + parseFloat(d.subtotal), 0);
      document.getElementById('detalle-subtotal').textContent = fmt(total);
      document.getElementById('detalle-total').textContent    = fmt(total);
      const estados = ['pendiente','en_preparacion','entregado','pagado','cancelado'];
      document.getElementById('estado-buttons').innerHTML = estados.map(e =>
        `<button class="btn-estado ${pedido.estado === e ? 'activo' : ''}" onclick="cambiarEstado('${e}')">${e.replace('_',' ')}</button>`
      ).join('');
    }

    async function cambiarEstado(estado) {
      if (!pedidoSeleccionado) return;
      try {
        const res = await fetch(`${API_PEDIDOS}/pedidos/${pedidoSeleccionado.id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ ...pedidoSeleccionado, estado })
        });
        if (res.ok) { mostrarToast('Estado actualizado', 'ok'); await cargarDatos(); seleccionarPedido(pedidoSeleccionado.id); }
      } catch (e) { mostrarToast('Error de conexión', 'error'); }
    }

    async function agregarProducto() {
      if (!pedidoSeleccionado) return;
      const productoId = document.getElementById('select-producto').value;
      const cantidad   = parseInt(document.getElementById('input-cantidad').value);
      const prod = productos.find(p => p.id === parseInt(productoId));
      if (!prod || cantidad < 1) { mostrarToast('Selecciona un producto válido', 'error'); return; }
      try {
        const res = await fetch(`${API_PEDIDOS}/pedidos/${pedidoSeleccionado.id}/detalles`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ producto_id: prod.id, cantidad, precio_unitario: prod.precio, subtotal: prod.precio * cantidad })
        });
        if (res.ok) { mostrarToast('Producto agregado', 'ok'); seleccionarPedido(pedidoSeleccionado.id); cargarDatos(); }
      } catch (e) { mostrarToast('Error de conexión', 'error'); }
    }

    async function eliminarDetalle(id) {
      if (!confirm('¿Eliminar este producto del pedido?')) return;
      try {
        const res = await fetch(`${API_PEDIDOS}/detalles/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
        if (res.ok) { mostrarToast('Producto eliminado', 'ok'); seleccionarPedido(pedidoSeleccionado.id); cargarDatos(); }
      } catch (e) { mostrarToast('Error de conexión', 'error'); }
    }

    function cargarSelectProductos() {
      document.getElementById('select-producto').innerHTML = productos.map(p =>
        `<option value="${p.id}">${p.nombre} — ${fmt(p.precio)}</option>`).join('');
    }

    function cargarSelectMesas() {
      document.getElementById('select-mesa').innerHTML = mesas.map(m =>
        `<option value="${m.id}">Mesa ${m.numero} (${m.capacidad} personas)</option>`).join('');
    }

    function abrirModalNuevo() {
      document.getElementById('input-fecha').value = new Date().toISOString().split('T')[0];
      document.getElementById('input-hora').value  = new Date().toTimeString().slice(0, 5);
      document.getElementById('modal-nuevo').classList.remove('hidden');
    }

    function cerrarModal() { document.getElementById('modal-nuevo').classList.add('hidden'); }

    async function crearPedido() {
      const mesa  = document.getElementById('select-mesa').value;
      const fecha = document.getElementById('input-fecha').value;
      const hora  = document.getElementById('input-hora').value;
      if (!mesa || !fecha || !hora) { mostrarToast('Completa todos los campos', 'error'); return; }
      try {
        const res = await fetch(`${API_PEDIDOS}/pedidos`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ mesa_id: parseInt(mesa), usuario_id: usuario.id || 1, estado: 'pendiente', total: 0, fecha, hora })
        });
        if (res.ok) { mostrarToast('Pedido creado', 'ok'); cerrarModal(); cargarDatos(); }
      } catch (e) { mostrarToast('Error de conexión', 'error'); }
    }

    document.querySelectorAll('.filtro').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filtro').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filtroActivo = btn.dataset.estado;
        renderLista();
      });
    });

    cargarDatos();
  </script>

</body>
</html>
