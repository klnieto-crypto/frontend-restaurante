<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurante XYZ — Productos</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0b09;
      --panel: #151412;
      --border: #2a2825;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: rgba(201,168,76,0.10);
      --text: #f0ead8;
      --muted: #7a7470;
      --dim: #3a3835;
      --green: #27ae60;
      --red: #c0392b;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 1.25rem;
      color: var(--gold);
      text-decoration: none;
    }

    .nav { display: flex; gap: 0.25rem; }

    .nav-link {
      color: var(--muted);
      text-decoration: none;
      padding: 0.35rem 0.9rem;
      border-radius: 6px;
      font-size: 0.88rem;
      transition: all 0.2s;
    }
    .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .nav-link.active { color: var(--gold); background: var(--gold-dim); }

    .user-bar { display: flex; align-items: center; gap: 1rem; font-size: 0.85rem; color: var(--muted); }

    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: var(--font-body);
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    .main {
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 600;
    }

    .btn-primary {
      background: var(--gold);
      color: #0c0b09;
      border: none;
      padding: 0.6rem 1.3rem;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--gold-light); }

    .btn-secondary {
      background: none;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.6rem 1.3rem;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: var(--muted); color: var(--text); }

    /* FILTROS CATEGORIAS */
    .filtros {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .filtro {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.35rem 1rem;
      border-radius: 20px;
      font-size: 0.82rem;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filtro:hover { border-color: var(--gold); color: var(--text); }
    .filtro.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }

    /* GRID PRODUCTOS */
    .productos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .producto-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.2s;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .producto-card:hover { border-color: var(--gold); transform: translateY(-2px); }

    .producto-card-top {
      background: var(--gold-dim);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .producto-emoji { font-size: 2.5rem; }

    .producto-precio {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--gold);
    }

    .producto-body { padding: 1.25rem; }

    .producto-nombre {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .producto-categoria {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.5rem;
    }

    .producto-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 1rem;
    }

    .disponible-badge {
      font-size: 0.72rem;
      padding: 0.2rem 0.65rem;
      border-radius: 20px;
      margin-bottom: 1rem;
      display: inline-block;
    }
    .disponible-si  { background: rgba(39,174,96,0.12);  color: var(--green); border: 1px solid rgba(39,174,96,0.25); }
    .disponible-no  { background: rgba(192,57,43,0.12);  color: var(--red);   border: 1px solid rgba(192,57,43,0.25); }

    .producto-acciones { display: flex; gap: 0.5rem; }

    .btn-accion {
      flex: 1;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.4rem;
      border-radius: 6px;
      font-family: var(--font-body);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .btn-accion:hover { border-color: var(--gold); color: var(--gold); }
    .btn-accion.danger:hover { border-color: var(--red); color: var(--red); }

    .cargando {
      text-align: center;
      color: var(--muted);
      padding: 3rem;
      grid-column: 1 / -1;
      font-size: 0.9rem;
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 460px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: slideUp 0.22s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h3 {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--gold);
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      transition: color 0.2s;
    }
    .modal-close:hover { color: var(--text); }

    .modal-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }

    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }

    .label {
      font-size: 0.73rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .input {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.65rem 0.9rem;
      border-radius: 7px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .input:focus { border-color: var(--gold); }
    select.input option { background: var(--panel); }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 0.88rem;
      z-index: 300;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .toast.ok    { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: var(--red);   color: var(--red); }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="../dashboard.html" class="logo">🍽 Restaurante XYZ</a>
      <nav class="nav">
        <a href="mesas.html" class="nav-link">Mesas</a>
        <a href="reservas.html" class="nav-link">Reservas</a>
        <a href="productos.html" class="nav-link active">Productos</a>
        <a href="pedidos.html" class="nav-link">Pedidos</a>
      </nav>
      <div class="user-bar">
        <span id="usuario-nombre"></span>
        <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
      </div>
    </div>
  </header>

  <div id="toast" class="toast hidden"></div>

  <main class="main">
    <div class="page-header">
      <h1 class="page-title">Productos</h1>
      <button class="btn-primary" onclick="abrirModal()">+ Nuevo producto</button>
    </div>

    <div class="filtros" id="filtros-categorias">
      <button class="filtro active" data-id="">Todos</button>
    </div>

    <div class="productos-grid" id="productos-grid">
      <p class="cargando">Cargando productos...</p>
    </div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay hidden" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-titulo">Nuevo Producto</h3>
        <button class="modal-close" onclick="cerrarModal()">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="producto-id" />

        <div class="form-group">
          <label class="label">Nombre</label>
          <input type="text" id="producto-nombre" class="input" placeholder="Ej: Bandeja paisa" />
        </div>
        <div class="form-group">
          <label class="label">Descripción</label>
          <input type="text" id="producto-desc" class="input" placeholder="Descripción breve" />
        </div>
        <div class="form-group">
          <label class="label">Precio</label>
          <input type="number" id="producto-precio" class="input" min="0" placeholder="Ej: 25000" />
        </div>
        <div class="form-group">
          <label class="label">Categoría</label>
          <select id="producto-categoria" class="input"></select>
        </div>
        <div class="form-group">
          <label class="label">Disponible</label>
          <select id="producto-disponible" class="input">
            <option value="1">Sí</option>
            <option value="0">No</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-primary" onclick="guardarProducto()">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    // karen: [Lógica módulo productos]
    const API   = 'http://localhost:8003';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '../index.html';

    const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
    document.getElementById('usuario-nombre').textContent = usuario.nombre || 'karen';

    let productos   = [];
    let categorias  = [];
    let filtroActivo = '';

    const emojis = ['🍽', '🥩', '🥗', '🍜', '🍲', '🥘', '🍷', '🧃', '🍰', '☕'];

    async function cargarDatos() {
      try {
        const [pRes, cRes] = await Promise.all([
          fetch(`${API}/productos`,  { headers: { 'Authorization': `Bearer ${token}` } }),
          fetch(`${API}/categorias`, { headers: { 'Authorization': `Bearer ${token}` } })
        ]);
        const pData = await pRes.json();
        const cData = await cRes.json();
        productos  = pData.data || [];
        categorias = cData.data || [];
        renderFiltros();
        renderProductos();
        cargarSelectCategorias();
      } catch (e) {
        document.getElementById('productos-grid').innerHTML =
          '<p class="cargando">No se pudo conectar con el servidor.</p>';
      }
    }

    function renderFiltros() {
      const cont = document.getElementById('filtros-categorias');
      const extras = categorias.map(c =>
        `<button class="filtro" data-id="${c.id}">${c.nombre}</button>`
      ).join('');
      cont.innerHTML = `<button class="filtro active" data-id="">Todos</button>${extras}`;

      cont.querySelectorAll('.filtro').forEach(btn => {
        btn.addEventListener('click', () => {
          cont.querySelectorAll('.filtro').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          filtroActivo = btn.dataset.id;
          renderProductos();
        });
      });
    }

    function renderProductos() {
      const grid = document.getElementById('productos-grid');
      const filtrados = filtroActivo
        ? productos.filter(p => String(p.categoria_id) === filtroActivo)
        : productos;

      if (!filtrados.length) {
        grid.innerHTML = '<p class="cargando">No hay productos registrados.</p>';
        return;
      }

      grid.innerHTML = filtrados.map((p, i) => {
        const cat = categorias.find(c => c.id === p.categoria_id);
        const emoji = emojis[i % emojis.length];
        const precio = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(p.precio);
        return `
          <div class="producto-card">
            <div class="producto-card-top">
              <span class="producto-emoji">${emoji}</span>
              <span class="producto-precio">${precio}</span>
            </div>
            <div class="producto-body">
              <div class="producto-nombre">${p.nombre}</div>
              <div class="producto-categoria">${cat ? cat.nombre : 'Sin categoría'}</div>
              <div class="producto-desc">${p.descripcion || '—'}</div>
              <span class="disponible-badge ${p.disponible ? 'disponible-si' : 'disponible-no'}">
                ${p.disponible ? 'Disponible' : 'No disponible'}
              </span>
              <div class="producto-acciones">
                <button class="btn-accion" onclick="editarProducto(${p.id})">Editar</button>
                <button class="btn-accion danger" onclick="eliminarProducto(${p.id})">Eliminar</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function cargarSelectCategorias() {
      const sel = document.getElementById('producto-categoria');
      sel.innerHTML = categorias.map(c =>
        `<option value="${c.id}">${c.nombre}</option>`
      ).join('');
    }

    function abrirModal(producto = null) {
      document.getElementById('modal-titulo').textContent = producto ? 'Editar Producto' : 'Nuevo Producto';
      document.getElementById('producto-id').value          = producto ? producto.id : '';
      document.getElementById('producto-nombre').value      = producto ? producto.nombre : '';
      document.getElementById('producto-desc').value        = producto ? producto.descripcion : '';
      document.getElementById('producto-precio').value      = producto ? producto.precio : '';
      document.getElementById('producto-categoria').value   = producto ? producto.categoria_id : '';
      document.getElementById('producto-disponible').value  = producto ? producto.disponible : '1';
      document.getElementById('modal').classList.remove('hidden');
    }

    function cerrarModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function editarProducto(id) {
      const p = productos.find(p => p.id === id);
      if (p) abrirModal(p);
    }

    async function guardarProducto() {
      const id         = document.getElementById('producto-id').value;
      const nombre     = document.getElementById('producto-nombre').value.trim();
      const desc       = document.getElementById('producto-desc').value.trim();
      const precio     = document.getElementById('producto-precio').value;
      const categoria  = document.getElementById('producto-categoria').value;
      const disponible = document.getElementById('producto-disponible').value;

      if (!nombre || !precio || !categoria) {
        mostrarToast('Completa todos los campos obligatorios', 'error');
        return;
      }

      const body = {
        nombre,
        descripcion: desc,
        precio: parseFloat(precio),
        categoria_id: parseInt(categoria),
        disponible: parseInt(disponible)
      };

      const url    = id ? `${API}/productos/${id}` : `${API}/productos`;
      const method = id ? 'PUT' : 'POST';

      try {
        const res = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(body)
        });

        if (res.ok) {
          mostrarToast(id ? 'Producto actualizado' : 'Producto creado', 'ok');
          cerrarModal();
          cargarDatos();
        } else {
          mostrarToast('Error al guardar', 'error');
        }
      } catch (e) {
        mostrarToast('Error de conexión', 'error');
      }
    }

    async function eliminarProducto(id) {
      if (!confirm('¿Eliminar este producto?')) return;
      try {
        const res = await fetch(`${API}/productos/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          mostrarToast('Producto eliminado', 'ok');
          cargarDatos();
        } else {
          mostrarToast('No se pudo eliminar', 'error');
        }
      } catch (e) {
        mostrarToast('Error de conexión', 'error');
      }
    }

    function mostrarToast(msg, tipo = 'ok') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${tipo}`;
      setTimeout(() => t.classList.add('hidden'), 3000);
    }

    function cerrarSesion() {
      localStorage.removeItem('token');
      localStorage.removeItem('usuario');
      window.location.href = '../index.html';
    }

    cargarDatos();
  </script>

</body>
</html>
