<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurante XYZ — Reservas</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="../dashboard.html" class="logo">🍽 Restaurante XYZ</a>
      <nav class="nav">
        <a href="mesas.html" class="nav-link">Mesas</a>
        <a href="reservas.html" class="nav-link active">Reservas</a>
        <a href="productos.html" class="nav-link">Productos</a>
        <a href="pedidos.html" class="nav-link">Pedidos</a>
      </nav>
      <div class="user-bar">
        <span id="usuario-nombre"></span>
        <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
      </div>
    </div>
  </header>

  <div id="toast" class="toast hidden"></div>

  <main class="main">
    <div class="page-header">
      <h1 class="page-title">Reservas</h1>
      <button class="btn-primary" onclick="abrirModal()">+ Nueva reserva</button>
    </div>

    <div class="filtros">
      <button class="filtro active" data-estado="">Todas</button>
      <button class="filtro" data-estado="pendiente">Pendientes</button>
      <button class="filtro" data-estado="confirmada">Confirmadas</button>
      <button class="filtro" data-estado="cancelada">Canceladas</button>
    </div>

    <div class="tabla-wrapper">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Cliente</th>
            <th>Teléfono</th>
            <th>Mesa</th>
            <th>Fecha</th>
            <th>Hora</th>
            <th>Personas</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-body">
          <tr><td colspan="9" class="cargando">Cargando reservas...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <div class="modal-overlay hidden" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-titulo">Nueva Reserva</h3>
        <button class="modal-close" onclick="cerrarModal()">✕</button>
      </div>
      <div class="modal-body modal-grid">
        <input type="hidden" id="reserva-id" />
        <div class="form-group full">
          <label class="label">Nombre del cliente</label>
          <input type="text" id="cliente-nombre" class="input" placeholder="Ej: María García" />
        </div>
        <div class="form-group">
          <label class="label">Teléfono</label>
          <input type="text" id="cliente-telefono" class="input" placeholder="3001234567" />
        </div>
        <div class="form-group">
          <label class="label">Mesa</label>
          <select id="reserva-mesa" class="input"></select>
        </div>
        <div class="form-group">
          <label class="label">Fecha</label>
          <input type="date" id="reserva-fecha" class="input" />
        </div>
        <div class="form-group">
          <label class="label">Hora</label>
          <input type="time" id="reserva-hora" class="input" />
        </div>
        <div class="form-group">
          <label class="label">N° personas</label>
          <input type="number" id="reserva-personas" class="input" min="1" placeholder="2" />
        </div>
        <div class="form-group full">
          <label class="label">Estado</label>
          <select id="reserva-estado" class="input">
            <option value="pendiente">Pendiente</option>
            <option value="confirmada">Confirmada</option>
            <option value="cancelada">Cancelada</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-primary" onclick="guardarReserva()">Guardar</button>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    // karen: [Lógica módulo reservas]
    const API   = 'http://localhost:8002';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '../index.html';

    const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
    document.getElementById('usuario-nombre').textContent = usuario.nombre || 'karen';

    let reservas = [], mesas = [], filtroActivo = '';

    async function cargarDatos() {
      try {
        const [rRes, mRes] = await Promise.all([
          fetch(`${API}/reservas`, { headers: { 'Authorization': `Bearer ${token}` } }),
          fetch(`${API}/mesas`,    { headers: { 'Authorization': `Bearer ${token}` } })
        ]);
        reservas = (await rRes.json()).data || [];
        mesas    = (await mRes.json()).data || [];
        renderTabla();
        cargarSelectMesas();
      } catch (e) {
        document.getElementById('tabla-body').innerHTML = '<tr><td colspan="9" class="cargando">No se pudo conectar.</td></tr>';
      }
    }

    function renderTabla() {
      const tbody = document.getElementById('tabla-body');
      const filtradas = filtroActivo ? reservas.filter(r => r.estado === filtroActivo) : reservas;
      if (!filtradas.length) { tbody.innerHTML = '<tr><td colspan="9" class="cargando">No hay reservas.</td></tr>'; return; }
      tbody.innerHTML = filtradas.map(r => `
        <tr>
          <td>${r.id}</td>
          <td>${r.cliente_nombre}</td>
          <td>${r.cliente_telefono || '—'}</td>
          <td>Mesa ${r.mesa_id}</td>
          <td>${r.fecha}</td>
          <td>${r.hora}</td>
          <td>${r.num_personas}</td>
          <td><span class="estado-badge estado-${r.estado}">${r.estado}</span></td>
          <td>
            <div class="acciones">
              <button class="btn-tabla" onclick="editarReserva(${r.id})">Editar</button>
              <button class="btn-tabla danger" onclick="eliminarReserva(${r.id})">Eliminar</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function cargarSelectMesas() {
      document.getElementById('reserva-mesa').innerHTML = mesas.map(m =>
        `<option value="${m.id}">Mesa ${m.numero} (${m.capacidad} personas)</option>`
      ).join('');
    }

    document.querySelectorAll('.filtro').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filtro').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filtroActivo = btn.dataset.estado;
        renderTabla();
      });
    });

    function abrirModal(reserva = null) {
      document.getElementById('modal-titulo').textContent       = reserva ? 'Editar Reserva' : 'Nueva Reserva';
      document.getElementById('reserva-id').value               = reserva ? reserva.id : '';
      document.getElementById('cliente-nombre').value           = reserva ? reserva.cliente_nombre : '';
      document.getElementById('cliente-telefono').value         = reserva ? reserva.cliente_telefono : '';
      document.getElementById('reserva-mesa').value             = reserva ? reserva.mesa_id : '';
      document.getElementById('reserva-fecha').value            = reserva ? reserva.fecha : '';
      document.getElementById('reserva-hora').value             = reserva ? reserva.hora : '';
      document.getElementById('reserva-personas').value         = reserva ? reserva.num_personas : '';
      document.getElementById('reserva-estado').value           = reserva ? reserva.estado : 'pendiente';
      document.getElementById('modal').classList.remove('hidden');
    }

    function cerrarModal() { document.getElementById('modal').classList.add('hidden'); }
    function editarReserva(id) { const r = reservas.find(r => r.id === id); if (r) abrirModal(r); }

    async function guardarReserva() {
      const id      = document.getElementById('reserva-id').value;
      const nombre  = document.getElementById('cliente-nombre').value.trim();
      const tel     = document.getElementById('cliente-telefono').value.trim();
      const mesa    = document.getElementById('reserva-mesa').value;
      const fecha   = document.getElementById('reserva-fecha').value;
      const hora    = document.getElementById('reserva-hora').value;
      const personas = document.getElementById('reserva-personas').value;
      const estado  = document.getElementById('reserva-estado').value;
      if (!nombre || !mesa || !fecha || !hora || !personas) { mostrarToast('Completa todos los campos', 'error'); return; }
      const url    = id ? `${API}/reservas/${id}` : `${API}/reservas`;
      const method = id ? 'PUT' : 'POST';
      try {
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ cliente_nombre: nombre, cliente_telefono: tel, mesa_id: parseInt(mesa), fecha, hora, num_personas: parseInt(personas), estado })
        });
        if (res.ok) { mostrarToast(id ? 'Reserva actualizada' : 'Reserva creada', 'ok'); cerrarModal(); cargarDatos(); }
        else mostrarToast('Error al guardar', 'error');
      } catch (e) { mostrarToast('Error de conexión', 'error'); }
    }

    async function eliminarReserva(id) {
      if (!confirm('¿Eliminar esta reserva?')) return;
      try {
        const res = await fetch(`${API}/reservas/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
        if (res.ok) { mostrarToast('Reserva eliminada', 'ok'); cargarDatos(); }
        else mostrarToast('No se pudo eliminar', 'error');
      } catch (e) { mostrarToast('Error de conexión', 'error'); }
    }

    cargarDatos();
  </script>

</body>
</html>
